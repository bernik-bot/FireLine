name: ci
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  core-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/core-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install fastapi "uvicorn[standard]" sqlmodel cryptography pytest httpx
      - name: Test
        run: pytest -q
